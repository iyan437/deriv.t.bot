yaml
name: Deriv Signal Bot

on:
  schedule:
    - cron: '/5    *'   # every 5 min
  workflow_dispatch:         # manual trigger

jobs:
  check-signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install ws node-fetch@2.7.0
      - run: node deriv-signal.js
        env:
          DERIV_APP_ID: ${{ secrets.DERIV_APP_ID }}
          DERIV_TOKEN: ${{ secrets.DERIV_TOKEN }}
          WP_CLIENT_ID: ${{ secrets.WP_CLIENT_ID }}
          WP_SECRET: ${{ secrets.WP_SECRET }}
          WP_PHONE: ${{ secrets.WP_PHONE }}
          SG_API_KEY: ${{ secrets.SG_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          NOTIFY_METHOD: ${{ secrets.NOTIFY_METHOD }}
